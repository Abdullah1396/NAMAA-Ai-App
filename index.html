<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نماء | NAMAA AI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="splash-screen">
        <img src="logo.png" class="splash-logo">
        <div class="loader"></div>
        <p>نُحيي أرضنا بذكاء...</p>
    </div>

    <div id="app" class="hidden">
        <header>
            <div class="user-info">
                <div class="avatar">👤</div>
                <div>
                    <span>مرحباً،</span>
                    <strong>أحمد محمد</strong>
                </div>
            </div>
            <div class="logo-top">
                <img src="logo.png" alt="NAMAA">
            </div>
        </header>

        <main>
            <div class="stats-card">
                <div class="stat-item">
                    <span class="label">نقاطك</span>
                    <span class="value">1,250</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="label">توفير المياه</span>
                    <span class="value">40%</span>
                </div>
            </div>

            <section class="scanner-box">
                <div class="scanner-info">
                    <h3>المساعد الذكي 🌿</h3>
                    <p>وجه الكاميرا نحو النبتة للتعرف عليها وتقييم استهلاكها للماء</p>
                </div>
                
                <div class="scan-window" onclick="startScanning()">
                    <div class="laser-line"></div>
                    <div class="scan-hint">اضغط للمسح الضوئي</div>
                </div>
            </section>

            <section class="quick-rewards">
                <div class="section-header">
                    <h4>مكافآت قريبة منك</h4>
                    <a href="#">الكل</a>
                </div>
                <div class="reward-pill">
                    <span>🎁 خصم 20% لدى مشاتل الرياض</span>
                    <button>احصل</button>
                </div>
            </section>
        </main>

        <nav class="nav-bar">
            <button class="nav-btn active">🏠<span>الرئيسية</span></button>
            <button class="nav-btn">📊<span>التقارير</span></button>
            <button class="nav-btn">🏆<span>الجوائز</span></button>
            <button class="nav-btn">⚙️<span>الإعدادات</span></button>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
